<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Planner</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">

    <!-- DaisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body x-data="app" x-cloak class="min-h-screen text-gray-200" style="background: linear-gradient(160deg, #050508 0%, #0f1117 35%, #111827 65%, #080b10 100%);">

    <!-- Header -->
    <header class="relative overflow-hidden py-8 px-6 border-b border-amber-900/30 bg-gradient-to-b from-amber-900/20 to-gray-900/0">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">

            <div class="flex items-center gap-4">
                <div>
                    <h2 class="font-cinzel text-white/80 tracking-wide">
                        Brigadurr's Combat Rules
                    </h2>
                    <h1 class="font-cinzel text-3xl text-amber-400 tracking-wider">
                        Character Planner
                    </h1>
                </div>
            </div>

            <div class="flex gap-1">
                <button class="btn bg-amber-900/10 text-xl border border-amber-400/25 transition-all duration-300 hover:text-amber-400" @click="save()" title="Save character">
                    <i class="ti ti-device-floppy"></i>
                </button>
                <button class="btn bg-amber-900/10 text-xl border border-amber-400/25 group transition-all duration-300 hover:text-red-400" @click="reset()" title="Reset character">
                    <i class="ti ti-refresh transition-transform duration-300 group-hover:-rotate-180"></i>
                </button>
            </div>
        </div>

        <!-- Ornate -->
        <div class="absolute bottom-0 left-0 right-0 h-px" style="background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--color-amber-400) 40%, transparent), transparent);">
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-8 px-6 space-y-8">

        <!-- Character -->
        <div class="card border-2 border-amber-900/30 border-b-yellow-700/30 bg-gradient-to-br from-amber-900/20 to-gray-900/0">

            <div class="card-body gap-4 py-6">
                <div class="flex items-start gap-6">
                    <!-- Name -->
                    <div class="flex flex-col grow">
                        <label class="label font-cinzel pb-1">
                            Name
                        </label>
                        <input type="text" placeholder="Type something..." maxlength="60" x-model="character.name" class="input input-ghost font-cinzel text-4xl w-full p-0 mb-1 focus:bg-transparent" />
                        <div class="flex gap-1 h-10">
                            <!-- TODO -->
                        </div>
                    </div>

                    <!-- Level -->
                    <div class="flex flex-col items-center">
                        <label class="label font-cinzel text-white pb-1">
                            Level
                        </label>
                        <input type="number" x-model.number="character.level" @input="if (character.level < minLevel) character.level = minLevel; if (character.level > maxLevel) character.level = maxLevel" class="input input-ghost font-cinzel text-4xl w-20 text-center appearance-none mb-1 focus:bg-transparent" style="-moz-appearance: textfield;" :min="minLevel" :max="maxLevel">
                        <div class="flex items-center gap-1">
                            <button class="btn w-10 h-10 flex items-center justify-center text-xs bg-amber-900/10 border border-amber-400/25 transition-all duration-300 hover:text-amber-400" :disabled="character.level <= minLevel" @click="levelDown()">
                                <i class="ti ti-minus"></i>
                            </button>
                            <button class="btn w-10 h-10 flex items-center justify-center text-xs bg-amber-900/10 border border-amber-400/25 transition-all duration-300 hover:text-amber-400" :disabled="character.level >= maxLevel" @click="levelUp()">
                                <i class="ti ti-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Training Points -->
            <div class="card border border-2 border-amber-900/60 border-b-yellow-700/60 bg-gradient-to-tl from-amber-900/33 to-gray-900/0">
                <div class="card-body items-center text-center gap-2 py-6">
                    <h3 class="font-cinzel text-base font-bold text-gray-300 uppercase tracking-widest">Training Points</h3>
                    <h1 class="font-thin font-cinzel text-9xl text-amber-400 glow-amber" x-text="trainingPoints">1</h1>
                </div>
            </div>

            <!-- Training Points -->
            <div class="card border border-2 border-blue-900/60 border-b-cyan-700/60 bg-gradient-to-tl from-blue-900/33 to-gray-900/0">
                <div class="card-body items-center text-center gap-2 py-6">
                    <h3 class="font-cinzel text-base font-bold text-gray-300 uppercase tracking-widest">Memory Slots</h3>
                    <h1 class="font-thin font-cinzel text-9xl text-blue-400 glow-blue" x-text="memorySlots">1</h1>
                </div>
            </div>

        </div>

    </main>

    <footer class="footer sm:footer-horizontal footer-center font-crimson-text text-base-content p-4">
        <aside>
            <p class="text-white/80">Designed for Dungeons & Dragons 5th Edition</p>
        </aside>
    </footer>

    <script src="app.js"></script>
</body>

</html>
